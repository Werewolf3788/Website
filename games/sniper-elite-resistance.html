            { id: 'm7_g3', cat: '7: Lock, Stock and Barrels', name: 'Gnome #3 (Island)', type: 'GN', desc: 'Small lake island.' },
            { id: 'm7_g4', cat: '7: Lock, Stock and Barrels', name: 'Gnome #4 (Rock)', type: 'GN', desc: 'On a rock in the pond.' },
            { id: 'm7_g5', cat: '7: Lock, Stock and Barrels', name: 'Gnome #5 (Barrow)', type: 'GN', desc: 'Wheelbarrows near yellow post.' },
            { id: 'm7_g6', cat: '7: Lock, Stock and Barrels', name: 'Gnome #6 (Roof)', type: 'GN', desc: 'In a hole of the roof.' },
            { id: 'm7_g7', cat: '7: Lock, Stock and Barrels', name: 'Gnome #7 (Flower)', type: 'GN', desc: 'Split tree in circular bed.' },
            { id: 'm7_g8', cat: '7: Lock, Stock and Barrels', name: 'Gnome #8 (Planter)', type: 'GN', desc: 'Corner of vegetable planter.' },
            { id: 'm7_g9', cat: '7: Lock, Stock and Barrels', name: 'Gnome #9 (Barrel)', type: 'GN', desc: 'Fruit barrel apple tree.' },
            { id: 'm7_g10', cat: '7: Lock, Stock and Barrels', name: 'Gnome #10 (Garden)', type: 'GN', desc: 'Back garden bed.' },

            { id: 'm8_pl1', cat: '8: End of the Line', name: 'Victory Is Imminent!', type: 'PL', desc: 'SE edge house top floor.' },
            { id: 'm8_tr1', cat: '8: End of the Line', name: 'Tanks for Nothing!', type: 'TR', desc: 'Destroy the Panzer tank.' },
            
            { id: 'dv_pl1', cat: 'DLC: Vercors Vendetta', name: 'No Brother of Mine', type: 'PL', desc: 'Starting house bottom floor box.' },
            { id: 'dv_e1', cat: 'DLC: Vercors Vendetta', name: 'Stone Eagle #1', type: 'SE', desc: 'Western clifftop building top.' }
        ];

        const appState = {
            activeHunter: 'Kevin',
            hunterData: [],
            collapsedSections: {}, 
            db: null, auth: null, user: null, unsub: null,

            init: async function() {
                // IMMEDIATELY render local list so screen isn't blank
                this.hunterData = sniperData.map(item => ({ ...item, collected: false }));
                this.render();

                try {
                    const app = initializeApp(firebaseConfig);
                    this.auth = getAuth(app);
                    this.db = getFirestore(app);
                    
                    await signInAnonymously(this.auth);

                    onAuthStateChanged(this.auth, async (u) => {
                        this.user = u;
                        if (u) {
                            document.getElementById('stat-line').innerText = `ID: ${u.uid.substring(0,8)}...`;
                            // BOOTSTRAP: Ensure the structure exists in the console immediately
                            await this.bootstrapUsers();
                        } else {
                            document.getElementById('stat-line').innerText = `OFFLINE`;
                        }
                        this.loadHunter(this.activeHunter);
                    });
                } catch (e) { 
                    console.error("Firebase Init Error:", e);
                    document.getElementById('stat-line').innerText = "LINK FAILED: CHECK CONFIG"; 
                }
            },

            // Ensures folders appear in Firebase Console immediately for the squad
            bootstrapUsers: async function() {
                const names = ['Kevin', 'Ray', 'TJ'];
                for (const name of names) {
                    const path = `artifacts/sniper-elite-resistance/data/public/user/${name}`;
                    const docRef = doc(this.db, path);
                    const snap = await getDoc(docRef);
                    if (!snap.exists()) {
                        await setDoc(docRef, { 
                            initialized: true, 
                            hunterName: name, 
                            progress: sniperData.map(i => ({ id: i.id, collected: false })) 
                        });
                    }
                }
            },

            loadHunter: function(name) {
                this.activeHunter = name;
                document.getElementById('hunter-display').innerText = name.toUpperCase();
                
                const theme = userThemes[name] || userThemes['Kevin'];
                document.documentElement.style.setProperty('--ser-color', theme.color);
                document.documentElement.style.setProperty('--ser-glow', theme.glow);

                document.querySelectorAll('.profile-btn').forEach(b => {
                    b.classList.remove('active-btn');
                    if(b.innerText === name) b.classList.add('active-btn');
                });

                if (this.unsub) this.unsub();

                const path = `artifacts/sniper-elite-resistance/data/public/user/${name}`;
                const docRef = doc(this.db, path);
                
                this.unsub = onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        const saved = snap.data().progress || [];
                        this.hunterData = sniperData.map(item => {
                            const status = saved.find(s => s.id === item.id);
                            return { ...item, collected: status ? status.collected : false };
                        });
                        this.render();
                    }
                }, (err) => { 
                    console.error("Snapshot Error:", err);
                    document.getElementById('stat-line').innerText = "ACCESS_DENIED"; 
                });
            },

            render: function() {
                const container = document.getElementById('section-container');
                container.innerHTML = '';
                const cats = [...new Set(this.hunterData.map(i => i.cat))];
                let totalCollected = 0;

                cats.forEach(cat => {
                    const items = this.hunterData.filter(i => i.cat === cat);
                    const collectedCount = items.filter(i => i.collected).length;
                    totalCollected += collectedCount;

                    const sectionId = cat.replace(/[^a-z0-9]/gi, '');
                    const isCollapsed = this.collapsedSections[sectionId] !== false; 

                    const section = document.createElement('div');
                    section.className = `category-section ${isCollapsed ? 'section-collapsed' : ''}`;
                    section.innerHTML = `
                        <div class="category-header" onclick="appState.toggleSection('${sectionId}')">
                            <h2>${cat}</h2>
                            <div style="font-weight:900; font-size: 14px; color: var(--ser-color);">${collectedCount}/${items.length}</div>
                        </div>
                        <div class="section-content">
                            <div class="item-grid"></div>
                        </div>
                    `;

                    const grid = section.querySelector('.item-grid');
                    items.forEach(item => {
                        const card = document.createElement('div');
                        card.className = `item-card ${item.collected ? 'completed' : ''}`;
                        card.innerHTML = `
                            <div>
                                <div class="item-type-tag">${item.type}</div>
                                <div style="font-weight:900; font-size:14px; margin-bottom:4px;">${item.name}</div>
                                <div style="font-size:11px; color:#aaa; font-style:italic; line-height:1.2;">${item.desc}</div>
                            </div>
                            ${item.collected ? `<div class="lock-badge">COLLECTED</div>` : `<button class="toggle-btn" onclick="appState.toggleItem('${item.id}')">Confirm Found</button>`}
                        `;
                        grid.appendChild(card);
                    });
                    container.appendChild(section);
                });

                const percent = Math.round((totalCollected / this.hunterData.length) * 100) || 0;
                document.getElementById('overall-bar').style.width = percent + '%';
                document.getElementById('percent-text').innerText = `TOTAL COLLECTION: ${percent}%`;
            },

            toggleItem: async function(id) {
                const item = this.hunterData.find(i => i.id === id);
                item.collected = !item.collected;
                this.render(); 
                this.sync();
            },

            toggleSection: function(id) {
                const current = this.collapsedSections[id] !== false;
                this.collapsedSections[id] = !current;
                this.render();
            },

            switchHunter: function(name) { this.loadHunter(name); },

            sync: async function() {
                if (!this.user) return;
                const path = `artifacts/sniper-elite-resistance/data/public/user/${this.activeHunter}`;
                const ref = doc(this.db, path);
                const progress = this.hunterData.map(i => ({ id: i.id, collected: i.collected }));
                try {
                    await setDoc(ref, { progress, lastUpdate: Date.now() }, { merge: true });
                } catch (err) { 
                    console.error("Sync Error:", err);
                    document.getElementById('stat-line').innerText = "WRITE_FAILURE"; 
                }
            }
        };

        window.appState = appState;
        appState.init();
    </script>
</body>
</html>
