name: Sync PSN Data

on:
  schedule:
    # Runs every 30 minutes to stay within GitHub Free Tier limits
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'

permissions:
  contents: write # Required to push the updated json file back to the repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install psn-api

      # Fixed: Now runs the .js file with node instead of searching for a .py file
      - name: Run PSN Sync
        env:
          PSN_NPSSO_WEREWOLF: ${{ secrets.PSN_NPSSO_WEREWOLF }}
          PSN_NPSSO_RAY: ${{ secrets.PSN_NPSSO_RAY }}
        run: node Playstation/psnscript.js

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Playstation/psn_data.json
          git commit -m "Wolf Sync: Updated PSN Stats [skip ci]" || echo "No changes to commit"
          git push
