# .github/workflows/deploy.yml
# Kevin's Official Pack Sync Engine - Deployment Workflow
# Version 1.0.7 - High-Frequency Sync Protocol (23-Minute Interval)
# Global Standards: Automated Rebase & Push | S:50 R:30 B:14 H:30 Alignment

name: Sync PSN Data and Deploy

on:
  schedule:
    - cron: '*/23 * * * *' # Synchronize every 23 minutes
  workflow_dispatch: # Manual Trigger enabled for Admin Kevin

permissions:
  contents: write
  pages: write
  id-token: write

# Prevent overlapping runs from causing Git conflicts
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history required for Conflict Shield rebase

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install psn-api

      - name: Run PSN Sync Script
        env:
          PSN_NPSSO_WEREWOLF: ${{ secrets.PSN_NPSSO_WEREWOLF }}
          PSN_NPSSO_RAY: ${{ secrets.PSN_NPSSO_RAY }}
        run: node Playstation/psnscript.js

      - name: Commit and Push Data Changes
        run: |
          git config --global user.name "Werewolf3788-Bot"
          git config --global user.email "bot@werewolf.ourflora.com"
          
          # Stage the new data generated by Omni-Sync
          git add Playstation/psn_data.json Playstation/tokens.json .nojekyll
          
          # Commit locally first to stabilize the index
          git commit -m "Automated PSN Sync: $(date)" || echo "No changes to commit"
          
          # Conflict Shield: Fetch and Rebase to handle manual edits made by Kevin/Ray
          git fetch origin main
          git rebase origin/main
          
          # Final push to the main branch
          git push origin main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
