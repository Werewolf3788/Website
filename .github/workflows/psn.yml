name: Sync PSN Data

on:
  schedule:
    # Set to 20 minutes to prevent deployment collisions and server lag
    - cron: '*/20 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

# FIX: Use a unique group name to stop collisions with internal GitHub tasks
concurrency:
  group: "psn-data-group"
  cancel-in-progress: false 

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-sync:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install psn-api

      - name: Run PSN Sync
        env:
          PSN_NPSSO_WEREWOLF: ${{ secrets.PSN_NPSSO_WEREWOLF }}
          PSN_NPSSO_RAY: ${{ secrets.PSN_NPSSO_RAY }}
        run: node Playstation/psnscript.js

      - name: Commit and Push Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          touch .nojekyll
          git add .nojekyll
          git add Playstation/psn_data.json
          git add Playstation/tokens.json || echo "no tokens"
          git commit -m "Wolf Sync: v7.5.4 Collision Guard [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push origin main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
