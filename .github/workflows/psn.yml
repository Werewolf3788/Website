name: Sync PSN Data

on:
  schedule:
    # Runs every 30 minutes to stay within GitHub Free Tier limits
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so rebase works correctly

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install psn-api

      - name: Run PSN Sync
        env:
          PSN_NPSSO_WEREWOLF: ${{ secrets.PSN_NPSSO_WEREWOLF }}
          PSN_NPSSO_RAY: ${{ secrets.PSN_NPSSO_RAY }}
        # Runs the JS script in the Playstation folder as seen in successful logs
        run: node Playstation/psnscript.js

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add Playstation/psn_data.json
          git commit -m "Wolf Sync: Updated PSN Stats [skip ci]" || echo "No changes to commit"
          # Pull latest changes and rebase to avoid "rejected" errors
          git pull --rebase origin main
          git push origin main
