name: Sync PSN Data

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install psn-api

      - name: Run PSN Sync
        env:
          PSN_NPSSO_WEREWOLF: ${{ secrets.PSN_NPSSO_WEREWOLF }}
          PSN_NPSSO_RAY: ${{ secrets.PSN_NPSSO_RAY }}
        run: node Playstation/psnscript.js

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Ensure both the data and the tokens (if updated) are tracked
          git add Playstation/psn_data.json
          git add Playstation/tokens.json || echo "No token changes"
          git commit -m "Wolf Sync: Updated PSN Stats [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main
