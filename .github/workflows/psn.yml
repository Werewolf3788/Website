# .github/workflows/deploy.yml
# Kevin's Official Pack Sync Engine - Deployment Workflow
# Version 1.0.8 - Conflict Resilience Protocol (Overwrite Strategy)

name: Sync PSN Data and Deploy

on:
  schedule:
    - cron: '*/23 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install psn-api

      - name: Run PSN Sync Script
        env:
          PSN_NPSSO_WEREWOLF: ${{ secrets.PSN_NPSSO_WEREWOLF }}
          PSN_NPSSO_RAY: ${{ secrets.PSN_NPSSO_RAY }}
        run: node Playstation/psnscript.js

      - name: Commit and Push Data Changes
        run: |
          git config --global user.name "Werewolf3788-Bot"
          git config --global user.email "bot@werewolf.ourflora.com"
          
          # Stage the new data
          git add Playstation/psn_data.json Playstation/tokens.json .nojekyll
          
          # Commit the bot's changes locally
          git commit -m "Automated PSN Sync: $(date)" || echo "No changes to commit"
          
          # RESILIENCE FIX: Force the bot's local changes to overwrite conflicts on these specific files
          git fetch origin main
          git pull --rebase -X theirs origin main
          
          # Final push to the main branch
          git push origin main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
