# .github/workflows/deploy.yml
# Kevin's Official Pack Sync Engine - Deployment Workflow
# Version 1.0.1 - Fixed Missing Environment Error

name: Sync PSN Data and Deploy

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    
    # CRITICAL: This block resolves the "Missing environment" error
    # It links the workflow to the GitHub Pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install psn-api

      - name: Run PSN Sync Script
        env:
          PSN_NPSSO_WEREWOLF: ${{ secrets.PSN_NPSSO_WEREWOLF }}
          PSN_NPSSO_RAY: ${{ secrets.PSN_NPSSO_RAY }}
        run: node Playstation/psnscript.js

      - name: Commit and Push Data Changes
        run: |
          git config --global user.name "Werewolf3788-Bot"
          git config --global user.email "bot@werewolf.ourflora.com"
          git add Playstation/psn_data.json Playstation/tokens.json .nojekyll
          git commit -m "Automated PSN Sync: $(date)" || echo "No changes to commit"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
