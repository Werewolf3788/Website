# .github/workflows/deploy.yml
# Kevin's Official Pack Sync Engine - Deployment Workflow
# Version 1.1.0 - Multi-Trigger Resilience (Push + Timer + Manual)
# This version ensures updates happen on a timer AND immediately after you edit code.

name: Sync PSN Data and Deploy

on:
  schedule:
    - cron: '*/23 * * * *' # BACKGROUND TIMER: Runs every 23 minutes automatically.
  push:
    branches:
      - main               # IMMEDIATE TRIGGER: Runs the second you push a change to GitHub.
    paths:
      - 'Playstation/**'   # Only trigger push runs if files in the Playstation folder change.
  workflow_dispatch:       # MANUAL TRIGGER: Gives you the "Run Workflow" button in GitHub Actions.

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential for the rebase logic below

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install psn-api

      - name: Run PSN Sync Script
        env:
          PSN_NPSSO_WEREWOLF: ${{ secrets.PSN_NPSSO_WEREWOLF }}
          PSN_NPSSO_RAY: ${{ secrets.PSN_NPSSO_RAY }}
        run: node Playstation/psnscript.js

      - name: Commit and Push Data Changes
        run: |
          git config --global user.name "Werewolf3788-Bot"
          git config --global user.email "bot@werewolf.ourflora.com"
          
          # Stage the specific data files
          git add Playstation/psn_data.json Playstation/tokens.json .nojekyll
          
          # Attempt to commit
          git commit -m "Automated PSN Sync: $(date)" || echo "No changes to commit"
          
          # REBASE STRATEGY: Pull latest changes and put our new data on top
          # This prevents the "Conflict" errors you saw in Run #154
          git pull --rebase origin main
          
          # Final push to the live site
          git push origin main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
