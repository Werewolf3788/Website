name: Sync PSN Data

on:
  schedule:
    # Runs every 30 minutes to stay within GitHub Free Tier limits
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install psnawp-api

      - name: Run PSN Sync
        env:
          PSN_NPSSO_WEREWOLF: ${{ secrets.PSN_NPSSO_WEREWOLF }}
          PSN_NPSSO_RAY: ${{ secrets.PSN_NPSSO_RAY }}
        # Updated to point to the Playstation folder and psnscript.py
        run: python Playstation/psnscript.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Updated to add the specific data file in the Playstation folder
          git add Playstation/psn_data.json
          git commit -m "Wolf Sync: Updated PSN Stats [skip ci]" || echo "No changes to commit"
          git push
